# ── Required ──────────────────────────────────────────────────────────────────
theme: steam         # selects layouts/partials/themes/<name>/card.html
hideAttribution: false # set to true to remove "Powered by Mindreeder" footer

# ── Identity ──────────────────────────────────────────────────────────────────
name: Victor Ashveil           # legal / primary name (used in vCard FN)
displayName: "The Veil"        # stage name; rendered as h1 when set
fullTitle: ""                  # overrides <title> and OG title; defaults to site title
tagline: "Beyond the Veil of Possibility"
subtitle: ""                   # e.g. "Mentalist & Illusionist"
jobTitle: Understudy at Large  # used by: minimal
company: Mindreeder Consulting # used by: minimal
location: Chicago, IL

# ── Media ─────────────────────────────────────────────────────────────────────
photo: /photo.jpg

# ── Contact ───────────────────────────────────────────────────────────────────
# phone is XOR-obfuscated with phoneKey to deter scrapers; decoded client-side.
# To encode: node -e "console.log(JSON.stringify('+15550001234'.split('').map(c => c.charCodeAt(0) ^ 42)))"
# Leave both empty to omit the phone field entirely.
phone: [1, 27, 31, 31, 31, 26, 26, 26, 27, 24, 25, 30]  # +15550001234
phoneKey: 42

# ── Links ─────────────────────────────────────────────────────────────────────
# icon: filename in assets/icons/ without .svg extension
# label: accessible text (aria-label, vCard field hint)
# text: display text shown next to the icon
# vcf: how to include in the vCard download (omit to exclude)
#   email  → EMAIL:<url minus mailto:>
#   social → X-SOCIALPROFILE;TYPE=<icon>:<url>
#   url    → URL:<url>
links:
  - icon: youtube
    url: https://youtube.com/@example
    label: YouTube
    text: "@example"
    vcf: social
  - icon: linkedin
    url: https://linkedin.com/in/example
    label: LinkedIn
    text: /in/example
    vcf: social
  - icon: instagram
    url: https://instagram.com
    label: Instagram
    text: "@example"
    vcf: social
  - icon: email
    url: mailto:hello@example.com
    label: Email
    text: hello@example.com
    vcf: email
  - icon: globe
    url: https://example.com
    label: Website
    text: example.com
    vcf: url

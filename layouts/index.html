{{ define "main" }}
{{ $card := hugo.Data.card }}
{{ partial (printf "themes/%s/card.html" $card.theme) $card }}

{{ if not $card.hideAttribution }}
<p class="attribution">Powered by <a href="https://consult.mindreeder.com" target="_blank" rel="noopener noreferrer">Mindreeder</a></p>
{{ end }}

<script>
  (function() {
    {{ with $card.phone }}
    var d = {{ . }};
    var k = {{ $card.phoneKey }};
    var e164 = d.map(function(c) { return String.fromCharCode(c ^ k); }).join('');
    var isNANP = e164.slice(0, 2) === "+1" && e164.length === 12;
    var display = isNANP
      ? "(" + e164.slice(2,5) + ") " + e164.slice(5,8) + "-" + e164.slice(8)
      : e164;
    var phoneLink = document.getElementById("phone-link");
    if (phoneLink) {
      phoneLink.href = "tel:" + e164;
      document.getElementById("phone-text").textContent = display;
    }
    {{ end }}

    var saveContact = document.getElementById("save-contact");
    if (saveContact) saveContact.addEventListener("click", function(e) {
      e.preventDefault();
      var lines = [
        "BEGIN:VCARD",
        "VERSION:3.0",
        "FN:{{ $card.name }}",
        {{ with $card.displayName }}"NICKNAME:{{ . }}",{{ end }}
        {{ with $card.jobTitle }}"TITLE:{{ . }}",{{ end }}
        {{ with $card.company }}"ORG:{{ . }}",{{ end }}
        {{ with $card.location }}"ADR;TYPE=HOME:;;{{ . }};;;;",{{ end }}
        {{ with $card.phone }}"TEL;TYPE=CELL:" + e164,{{ end }}
        {{ range where $card.links "vcf" "email" }}"EMAIL:{{ .url | strings.TrimPrefix "mailto:" }}",{{ end }}
        {{ range where $card.links "vcf" "social" }}"X-SOCIALPROFILE;TYPE={{ .icon }}:{{ .url }}",{{ end }}
        {{ range where $card.links "vcf" "url" }}"URL:{{ .url }}",{{ end }}
        "END:VCARD",
        ""
      ];
      var blob = new Blob([lines.join("\r\n")], { type: "text/vcard" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "{{ $card.name | urlize }}.vcf";
      a.click();
      URL.revokeObjectURL(url);
    });
  })();
</script>
{{ end }}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 352 600" preserveAspectRatio="none">
  <defs>
    <clipPath id="torn-shape">
      <path d="
        M 0,18
        C 8,10  14,22  22,14
        C 30,6   38,20  48,12
        C 58,4   68,18  80,10
        C 92,2   102,16 114,8
        C 126,0  136,14 150,8
        C 164,2  174,16 188,10
        C 202,4  212,18 224,10
        C 236,2  248,16 260,8
        C 272,0  282,14 294,8
        C 306,2  316,16 328,10
        C 340,4  348,14 352,10
        L 352,590
        C 344,598 336,586 326,594
        C 316,602 306,588 294,596
        C 282,604 270,590 258,596
        C 246,602 234,588 222,594
        C 210,600 198,588 186,594
        C 174,600 162,588 150,594
        C 138,600 126,586 114,594
        C 102,602 90,588  78,596
        C 66,604  54,590  42,596
        C 30,602  18,590   8,596
        C 4,598   2,600   0,598
        Z
      "/>
    </clipPath>
    <linearGradient id="parchment-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8b48e"/>
      <stop offset="100%" stop-color="#b89e78"/>
    </linearGradient>
    <radialGradient id="parchment-light" cx="30%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ddd0aa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c8b48e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="parchment-dark" cx="70%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#a08060" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b89e78" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="top-curl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a6a40" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c8b48e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottom-curl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8b48e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8a6a40" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Parchment body with torn/curved top and bottom edges -->
  <path d="
    M 0,18
    C 8,10  14,22  22,14
    C 30,6   38,20  48,12
    C 58,4   68,18  80,10
    C 92,2   102,16 114,8
    C 126,0  136,14 150,8
    C 164,2  174,16 188,10
    C 202,4  212,18 224,10
    C 236,2  248,16 260,8
    C 272,0  282,14 294,8
    C 306,2  316,16 328,10
    C 340,4  348,14 352,10
    L 352,590
    C 344,598 336,586 326,594
    C 316,602 306,588 294,596
    C 282,604 270,590 258,596
    C 246,602 234,588 222,594
    C 210,600 198,588 186,594
    C 174,600 162,588 150,594
    C 138,600 126,586 114,594
    C 102,602 90,588  78,596
    C 66,604  54,590  42,596
    C 30,602  18,590   8,596
    C 4,598   2,600   0,598
    Z
  " fill="url(#parchment-base)"/>

  <!-- Lighting overlays clipped to torn shape -->
  <rect width="352" height="600" fill="url(#parchment-light)" clip-path="url(#torn-shape)"/>
  <rect width="352" height="600" fill="url(#parchment-dark)" clip-path="url(#torn-shape)"/>

  <!-- Curl shadows clipped to torn shape -->
  <rect width="352" height="60" fill="url(#top-curl)" clip-path="url(#torn-shape)"/>
  <rect y="540" width="352" height="60" fill="url(#bottom-curl)" clip-path="url(#torn-shape)"/>
</svg>
